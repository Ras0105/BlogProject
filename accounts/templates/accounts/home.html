{% extends 'base.html' %}

{% block title %}Home – MyBlog{% endblock %}

{% block content %}
<h1>Welcome to MyBlog</h1>

{% if user.is_authenticated %}
  <p>Hello, {{ user.username }}! 👋</p>
  <a href="{% url 'post_list' %}" class="btn">View All Posts →</a>
{% else %}
  <p>Please <a href="{% url 'login' %}">login</a> or <a href="{% url 'register' %}">register</a> to get started.</p>
{% endif %}
{% endblock %}
