{% extends 'base.html' %}

{% block title %}New Post – MyBlog{% endblock %}

{% block content %}
<h2>Create New Post</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Publish Post</button>
    <a href="{% url 'post_list' %}">Cancel</a>
</form>
{% endblock %}
